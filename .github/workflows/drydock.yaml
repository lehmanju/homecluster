name: drydock

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  drydock:
    runs-on: ubuntu-latest
    steps:
      - uses: sholdee/drydock/pr-action@d7e639f7a8879f77a8afe8c886900d9e97a9ca92 # main
        with:
          version: latest
          skip-secrets: "true"
          comment-mode: both
          changed-only-include: |
            kubernetes/**
          changed-only-ignore: |
            .github/**
          enable-ksops-compat: true
